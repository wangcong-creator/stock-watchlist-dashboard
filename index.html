<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Watchlist Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.container{text-align:center;padding:40px 24px}
h1{font-size:2rem;font-weight:700;color:#f1f5f9;margin-bottom:8px}
.subtitle{color:#64748b;font-size:1rem;margin-bottom:48px}
.cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:32px 40px;text-decoration:none;color:inherit;transition:all .2s;min-width:200px}
.card:hover{border-color:#3b82f6;transform:translateY(-3px);box-shadow:0 8px 30px rgba(59,130,246,.2)}
.card-flag{font-size:2.5rem;margin-bottom:12px}
.card-title{font-size:1.1rem;font-weight:700;color:#f1f5f9;margin-bottom:4px}
.card-sub{font-size:.82rem;color:#64748b}
</style>
</head>
<body>
<div class="container">
  <h1>📈 Stock Watchlist Dashboard</h1>
  <p class="subtitle">124 stocks · Semiconductor &amp; Tech</p>
  <div class="cards">
    <a class="card" href="stock-dashboard/dashboard.html">
      <div class="card-flag">🇺🇸</div>
      <div class="card-title">English</div>
      <div class="card-sub">English Dashboard</div>
    </a>
    <a class="card" href="stock-dashboard/dashboard_zh.html">
      <div class="card-flag">🇨🇳</div>
      <div class="card-title">中文版</div>
      <div class="card-sub">Chinese Dashboard</div>
    </a>
  </div>
</div>
</body>
</html>
